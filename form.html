<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda tu Cita</title>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      padding: 28px 28px;
      width: 100%;
      max-width: 480px;
    }
    h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 20px;
      border-left: 4px solid #D0021B;
      padding-left: 10px;
    }
    .form-row { display: flex; gap: 14px; margin-bottom: 14px; }
    .form-row2 { margin-bottom: 14px; }
    .form-group { display: flex; flex-direction: column; flex: 1; gap: 4px; }
    label {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      color: #222;
      background: #fff;
      outline: none;
      width: 100%;
    }
    input:focus, select:focus { border-color: #D0021B; }
    input::placeholder, select::placeholder { color: #bbb; }
    .date-wrap { position: relative; }
    .date-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      pointer-events: none;
    }
    .date-wrap input { padding-left: 32px; }
    .error-msg { display: none; color: #D0021B; font-size: 11px; margin-top: 2px; }
    .recaptcha-wrap { margin: 14px 0; }
    .alert {
      display: none;
      padding: 10px 14px;
      border-radius: 5px;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .alert.success { background: #e0f7ea; color: #1a7a3f; border: 1px solid #b2dfcc; }
    .alert.error   { background: #ffe0e0; color: #a80016; border: 1px solid #f5c6c6; }
    .btn-confirm {
      width: 100%;
      padding: 13px;
      background: #D0021B;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .btn-confirm:hover { background: #a80016; }
    .btn-confirm:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Agenda tu Cita</h2>

    <div id="alertBox" class="alert"></div>

    <form id="formservi1">

      <div class="form-row">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="fieldNombre" placeholder="Juan Pérez" />
          <span class="error-msg" id="errNombre">Ingresa tu nombre.</span>
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="tel" id="fieldTelefono" placeholder="956 123 456" />
          <span class="error-msg" id="errTelefono">Ingresa tu teléfono.</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Modelo</label>
          <select id="modeloVehiculo">
            <option value="" disabled selected>Selecciona modelo</option>
            <option value="125">Hilux</option>
            <option value="129">Yaris</option>
            <option value="120">Corolla</option>
            <option value="128">Rav 4</option>
            <option value="126">Land Cruiser Prado</option>
            <option value="123">Fortuner</option>
            <option value="359">Camry</option>
            <option value="131">Otros Modelos</option>
          </select>
          <span class="error-msg" id="errModelo">Selecciona un modelo.</span>
        </div>
        <div class="form-group">
          <label>Placa</label>
          <input type="text" id="fieldPlaca" placeholder="ABC-123" />
          <span class="error-msg" id="errPlaca">Ingresa la placa.</span>
        </div>
      </div>

      <div class="form-row2">
        <div class="form-group">
          <label>Servicio</label>
          <input type="text" id="fieldComentario" placeholder="Escribe tu servicio" />
          <span class="error-msg" id="errServicio">Describe el servicio.</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Fecha</label>
          <div class="date-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <input type="date" id="fecha" />
          </div>
          <span class="error-msg" id="errFecha">Selecciona una fecha.</span>
        </div>
        <div class="form-group">
          <label>Horario</label>
          <select id="fieldhora">
            <option value="" disabled selected>Selecciona hora</option>
            <option>08:00 AM</option>
            <option>09:00 AM</option>
            <option>10:00 AM</option>
            <option>11:00 AM</option>
            <option>01:00 PM</option>
            <option>02:00 PM</option>
            <option>03:00 PM</option>
            <option>04:00 PM</option>
            <option>05:00 PM</option>
          </select>
          <span class="error-msg" id="errHora">Selecciona un horario.</span>
        </div>
      </div>

      <!-- reCAPTCHA -->
      <div class="recaptcha-wrap">
        <div class="g-recaptcha" data-sitekey="6Ldne8ksAAAAAAb6-TeatxAULJtDXLMPCRfpTQQe"></div>
        <span class="error-msg" id="errCaptcha" style="display:none;">Confirma que no eres un robot.</span>
      </div>

      <button type="button" id="btnConfirmar" class="btn-confirm">Confirmar Cita</button>

    </form>
  </div>

  <script>
    // Fecha mínima hoy
    document.getElementById('fecha').setAttribute('min', new Date().toISOString().split('T')[0]);

    $(document).ready(function () {
      $('#btnConfirmar').on('click', function () {

        var valido = true;

        var campos = [
          { id: 'fieldNombre',     err: 'errNombre'   },
          { id: 'fieldTelefono',   err: 'errTelefono' },
          { id: 'modeloVehiculo',  err: 'errModelo'   },
          { id: 'fieldPlaca',      err: 'errPlaca'    },
          { id: 'fieldComentario', err: 'errServicio' },
          { id: 'fecha',           err: 'errFecha'    },
          { id: 'fieldhora',       err: 'errHora'     }
        ];

        campos.forEach(function (c) {
          if ($('#' + c.id).val().trim() === '') {
            $('#' + c.id).css('border-color', '#D0021B');
            $('#' + c.err).show();
            valido = false;
          } else {
            $('#' + c.id).css('border-color', '#ddd');
            $('#' + c.err).hide();
          }
        });

        // Validar reCAPTCHA
        var token = grecaptcha.getResponse();
        if (token === '') {
          $('#errCaptcha').show();
          valido = false;
        } else {
          $('#errCaptcha').hide();
        }

        if (!valido) return;

        $('#btnConfirmar').prop('disabled', true).text('Enviando...');

        $.ajax({
          url: '/crmv1_dash/app/register',
          method: 'POST',
          data: {
            nombre:   $('#fieldNombre').val(),
            telefono: $('#fieldTelefono').val(),
            modelo:   $('#modeloVehiculo').val(),
            placa:    $('#fieldPlaca').val(),
            servicio: $('#fieldComentario').val(),
            fecha:    $('#fecha').val(),
            hora:     $('#fieldhora').val(),
            'g-recaptcha-response': token
          },
          success: function () {
            $('#alertBox').removeClass('error').addClass('alert success')
              .text('¡Cita confirmada! Te contactaremos pronto.').show();
            $('#formservi1')[0].reset();
            grecaptcha.reset();
            $('#btnConfirmar').prop('disabled', false).text('Confirmar Cita');
          },
          error: function () {
            $('#alertBox').removeClass('success').addClass('alert error')
              .text('Error al enviar. Intenta de nuevo.').show();
            grecaptcha.reset();
            $('#btnConfirmar').prop('disabled', false).text('Confirmar Cita');
          }
        });

      });
    });
  </script>
</body>
</html>
