<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda tu Cita</title>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      margin: 0;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      padding: 32px 36px;
      width: 520px;
    }
    h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 24px;
      border-left: 4px solid #D0021B;
      padding-left: 12px;
    }
    .form-row { display: flex; gap: 16px; margin-bottom: 16px; }
    .form-row2 { margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; flex: 1; gap: 5px; }
    label {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      color: #222;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      box-sizing: border-box;
    }
    input:focus, select:focus { border-color: #D0021B; background: #fff; }
    input::placeholder { color: #bbb; }
    .select-wrap, .date-wrap { position: relative; }
    .date-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      pointer-events: none;
    }
    .date-wrap input { padding-left: 32px; }
    .recaptcha-wrap { margin: 16px 0 8px 0; }
    .alert {
      display: none;
      padding: 10px 14px;
      border-radius: 5px;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .alert.success { background: #e0f7ea; color: #1a7a3f; border: 1px solid #b2dfcc; }
    .alert.error   { background: #ffe0e0; color: #a80016; border: 1px solid #f5c6c6; }
    .btn-confirm {
      width: 100%;
      margin-top: 8px;
      padding: 11px;
      background: #D0021B;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-confirm:hover { background: #a80016; }
    .btn-confirm:disabled { background: #ccc; cursor: not-allowed; }
    .captcha-error {
      display: none;
      color: #D0021B;
      font-size: 11px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Agenda tu Cita</h2>

    <div id="alertBox" class="alert"></div>

    <form id="formservi1" novalidate>

      <div class="form-row">
        <div class="form-group">
          <label for="fieldNombre">Nombre</label>
          <input type="text" id="fieldNombre" placeholder="Juan Pérez" required />
        </div>
        <div class="form-group">
          <label for="fieldTelefono">Teléfono</label>
          <input type="tel" id="fieldTelefono" placeholder="956 123 456" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="modeloVehiculo">Modelo</label>
          <div class="select-wrap">
            <select id="modeloVehiculo" required>
              <option value="" disabled selected>Selecciona modelo</option>
              <option value="125">Hilux</option>
              <option value="129">Yaris</option>
              <option value="120">Corolla</option>
              <option value="128">Rav 4</option>
              <option value="126">Land Cruiser Prado</option>
              <option value="123">Fortuner</option>
              <option value="359">Camry</option>
              <option value="131">Otros Modelos</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="fieldPlaca">Placa</label>
          <input type="text" id="fieldPlaca" placeholder="ABC-123" required />
        </div>
      </div>

      <div class="form-row2">
        <div class="form-group">
          <label for="fieldComentario">Servicio</label>
          <input type="text" id="fieldComentario" placeholder="Escribe tu servicio" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="fecha">Fecha</label>
          <div class="date-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            <input type="date" id="fecha" required />
          </div>
        </div>
        <div class="form-group">
          <label for="fieldhora">Horario</label>
          <div class="select-wrap">
            <select id="fieldhora" required>
              <option value="" disabled selected>Selecciona hora</option>
              <option value="08:00 AM">08:00 AM</option>
              <option value="09:00 AM">09:00 AM</option>
              <option value="10:00 AM">10:00 AM</option>
              <option value="11:00 AM">11:00 AM</option>
              <option value="01:00 PM">01:00 PM</option>
              <option value="02:00 PM">02:00 PM</option>
              <option value="03:00 PM">03:00 PM</option>
              <option value="04:00 PM">04:00 PM</option>
              <option value="05:00 PM">05:00 PM</option>
            </select>
          </div>
        </div>
      </div>

      <!-- reCAPTCHA v2 -->
      <div class="recaptcha-wrap">
        <div class="g-recaptcha" data-sitekey="6LfdhMksAAAAADr9G79xPrek7LHhvzEttLvs3h4e"></div>
        <span class="captcha-error" id="errCaptcha">Confirma que no eres un robot.</span>
      </div>

      <button type="submit" class="btn-confirm">Confirmar Cita</button>

    </form>
  </div>

  <script>
    document.getElementById('fecha').setAttribute('min', new Date().toISOString().split('T')[0]);

    $('#formservi1').on('submit', function (e) {
      e.preventDefault();

      // Validar reCAPTCHA
      var token = grecaptcha.getResponse();
      if (token === '') {
        $('#errCaptcha').show();
        return;
      }
      $('#errCaptcha').hide();

      // Validar campos con validación nativa del navegador
      var form = document.getElementById('formservi1');
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      $('#btnConfirmar').prop('disabled', true);
      $('.btn-confirm').text('Enviando...').prop('disabled', true);

      $.ajax({
        url: '/crmv1_dash/app/register',
        method: 'POST',
        data: {
          nombre:   $('#fieldNombre').val(),
          telefono: $('#fieldTelefono').val(),
          modelo:   $('#modeloVehiculo').val(),
          placa:    $('#fieldPlaca').val(),
          servicio: $('#fieldComentario').val(),
          fecha:    $('#fecha').val(),
          hora:     $('#fieldhora').val(),
          'g-recaptcha-response': token
        },
        success: function () {
          $('#alertBox').removeClass('error').addClass('alert success')
            .text('¡Cita confirmada! Te contactaremos pronto.').show();
          $('#formservi1')[0].reset();
          grecaptcha.reset();
          $('.btn-confirm').text('Confirmar Cita').prop('disabled', false);
        },
        error: function () {
          $('#alertBox').removeClass('success').addClass('error alert')
            .text('Error al enviar. Intenta de nuevo.').show();
          grecaptcha.reset();
          $('.btn-confirm').text('Confirmar Cita').prop('disabled', false);
        }
      });
    });
  </script>
</body>
</html>
